// ─── RNG ───────────────────────────────────────────────────
const rnd = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;
const rndF = () => Math.random();
const choice = arr => arr[Math.floor(Math.random() * arr.length)];
const weighted = (items, weights) => {
  const total = weights.reduce((a,b)=>a+b,0);
  let r = Math.random()*total;
  for(let i=0;i<items.length;i++){r-=weights[i];if(r<=0)return items[i];}
  return items[items.length-1];
};

const out = document.getElementById('out');

function print(text='', cls='') {
  const lines = String(text).split('\n');
  for (const line of lines) {
    const el = document.createElement('div');
    el.className = 'line' + (cls ? ' line-'+cls : '');
    el.textContent = line;
    out.appendChild(el);
  }
  outputDiv.scrollTop = outputDiv.scrollHeight;
}

function clearOutput() { out.innerHTML = ''; }

function hpBar(hp, max, len=16) {
  const filled = Math.round((hp/max)*len);
  return '█'.repeat(Math.max(0,filled)) + '░'.repeat(Math.max(0,len-filled));
}

let inputCallback = null;

function setButtons(defs) {
  const container = document.getElementById('buttons');
  container.innerHTML = '';
  for (const d of defs) {
    const btn = document.createElement('button');
    btn.className = 'btn' + (d.cls ? ' btn-'+d.cls : '');
    btn.textContent = d.label;
    if (d.disabled) btn.classList.add('btn-disabled');
    btn.addEventListener('click', () => d.action());
    container.appendChild(btn);
  }
}

function setInput(placeholder, cb) {
  const area = document.getElementById('input-area');
  const inp = document.getElementById('text-input');
  area.classList.add('active');
  inp.placeholder = placeholder || 'Enter...';
  inp.value = '';
  inp.focus();
  inputCallback = cb;
}

function clearInput() {
  const area = document.getElementById('input-area');
  area.classList.remove('active');
  inputCallback = null;
}

document.getElementById('submit-btn').addEventListener('click', () => {
  const val = document.getElementById('text-input').value.trim();
  if (inputCallback) { const cb = inputCallback; inputCallback = null; cb(val); }
});
document.getElementById('text-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const val = e.target.value.trim();
    if (inputCallback) { const cb = inputCallback; inputCallback = null; cb(val); }
  }
});

function randomLoot(n=1, excludeSecret=true) {
  let pool = excludeSecret ? ALL_ITEMS.filter(i=>i.name!=="Mari's Tails Plushie") : ALL_ITEMS;
  pool = [...pool];
  const result=[];
  for(let i=0;i<Math.min(n,pool.length);i++){
    const idx=Math.floor(Math.random()*pool.length);
    result.push({...pool.splice(idx,1)[0]});
  }
  return result;
}
function shopStock() {
  let pool = ALL_ITEMS.filter(i=>i.value>0 && i.name!=="Mari's Tails Plushie");
  pool = [...pool];
  const result=[];
  for(let i=0;i<Math.min(4,pool.length);i++){
    const idx=Math.floor(Math.random()*pool.length);
    result.push({...pool.splice(idx,1)[0]});
  }
  return result;
}

  char.hp = Math.max(0, char.hp - reduced);

}

function applyStatusEffects(char) {
  const msgs = [];
  for (const ef of [...char.status_effects]) {
    if (ef==="Bleeding")  { const d=rnd(2,5); char.hp=Math.max(0,char.hp-d); msgs.push(`  🩸 ${char.name} bleeds for ${d} damage.`); }
    if (ef==="Plague")    { const d=rnd(3,7); char.hp=Math.max(0,char.hp-d); msgs.push(`  🧪 Plague wracks ${char.name} for ${d} damage.`); }
    if (ef==="Rotting")   { char.armor=Math.max(0,char.armor-1); msgs.push(`  🪦 ${char.name}'s flesh rots — armor reduced.`); }
    if (ef==="Cursed")    { /* passive */ }
    if (ef==="Stunned")   { msgs.push(`  💫 ${char.name} is Stunned and loses their turn!`); }
  }
  return msgs;
}

function startCombat(enemy, isBoss, isElite=false) {
  const p = G.player;
  G.combat_state = {
    enemy, isBoss, isElite,
    round: 0,
    player_armor_start: p.armor,
    over: false,
  };
  clearOutput();
  print(`\n  ═══════════════════════════════════════`, isBoss?'boss':'red');
  print(`  ⚔  ENCOUNTER: ${enemy.name}`, isBoss?'boss':'red');
  print(`  "${enemy.description}"`, 'dim');
  print(`  ═══════════════════════════════════════`, isBoss?'boss':'red');
  print();
  doCombatRound();
}

function doCombatRound() {
  const cs = G.combat_state;
  const p = G.player;
  const e = cs.enemy;
  cs.round++;

  print(`\n  ── Round ${cs.round} ──────────────────────────────`, 'dim');
  print(`  ${p.name} HP: ${p.hp}/${p.max_hp}  │  ${e.name} [${hpBar(e.hp,e.max_hp)}] ${e.hp}/${e.max_hp}`);
  updateHUD();

  // Player status effects
  for (const msg of applyStatusEffects(p)) { print(msg, 'red'); }
  if (!p.hp) { combatEnd('dead'); return; }

  // Enemy status effects
  for (const msg of applyStatusEffects(e)) { print(msg, 'dim'); }
  if (!e.hp) { combatEnd('win'); return; }

  // Player stunned?
  if (p.status_effects.includes('Stunned')) {
    p.status_effects = p.status_effects.filter(x=>x!=='Stunned');
    print(`  💫 You shake off the stun — but lose this turn.`, 'blue');
    doEnemyTurn();
    return;
  }

  showPlayerActions();
}

function showPlayerActions() {
  const p = G.player;
  const e = G.combat_state.enemy;
  print();
  print(`  What do you do?`, 'gold');
  const btns = [
    {label:`[1] Attack`, cls:'primary', action(){ doAttack(); }}
  ];
  p.skills.forEach((sk,i)=>{
    btns.push({label:`[${i+2}] ${sk.name}`, action(){ doSkill(sk); }});
  });
  const usable = p.inventory.filter(it=>it.type==='consumable');
  if(usable.length) btns.push({label:`[${p.skills.length+2}] Use Item`, cls:'gold', action(){ showItemMenu(usable); }});
  btns.push({label:`[F] Flee`, action(){ doFlee(); }});
  setButtons(btns);
}

function doAttack() {
  setButtons([]);
  const p = G.player;
  const e = G.combat_state.enemy;
  const base = p._cheat_dmg ? p._cheat_dmg : p.strength + rnd(1,8);
  const crit = Math.random() < (0.05 + p.agility*0.01);
  const dmg = crit ? base*2 : base;
  const dealt = takeDmg(e, dmg);
  print(`  ⚔  You strike ${e.name} for ${dealt} damage.${crit?' ★ CRITICAL HIT!':''}`, crit?'gold':'');
  if (!e.hp) { combatEnd('win'); return; }
  doEnemyTurn();
}

function doSkill(sk) {
  setButtons([]);
  const result = SKILL_FNS[sk.fn](G.player, G.combat_state.enemy);
  print(result, 'purple');
  if (!G.combat_state.enemy.hp) { combatEnd('win'); return; }
  doEnemyTurn();
}

function showItemMenu(usable) {
  clearOutput();
  print(`\n  ── Items ──────────────────────────────`, 'gold');
  usable.forEach((it,i)=>print(`  [${i+1}] ${it.name} — ${it.desc}`));
  print(`  [0] Cancel`,'dim');
  const btns = usable.map((it,i)=>({
    label:`${it.name}`,
    cls:'gold',
    action(){
      G.player.inventory = G.player.inventory.filter(x=>x!==it);
      const r = it.use(G.player);
      clearOutput();
      print(r, 'green');
      updateHUD();
      if (!G.combat_state.enemy.hp) { combatEnd('win'); return; }
      doEnemyTurn();
    }
  }));
  btns.unshift({label:'← Cancel', action(){ clearOutput(); showPlayerActions(); }});
  setButtons(btns);
}

function doFlee() {
  setButtons([]);
  const p = G.player;
  const cs = G.combat_state;
  const chance = 0.40 + p.agility * 0.02;
  if (Math.random() < chance) {
    print(`\n  🏃 NIGERUNDAYO!`, 'green');
    p.armor = cs.player_armor_start;
    combatEnd('flee');
  } else {
    print(`  ✗ No escape! ${cs.enemy.name} cock blocks you`, 'red');
    doEnemyTurn();
  }
}

function doEnemyTurn() {
  const p = G.player;
  const e = G.combat_state.enemy;

  if (e.status_effects.includes('Stunned')) {
    e.status_effects = e.status_effects.filter(x=>x!=='Stunned');
    print(`  💫 ${e.name} is stunned — loses their turn.`, 'blue');
    setButtons([{label:'Continue →', action: doCombatRound}]);
    return;
  }

  const rawDmg = enemyAttack(e);
  const dealt = takeDmg(p, rawDmg);
  print(`\n  👹 ${e.name} attacks! Deals ${dealt} damage.`, 'red');
  updateHUD();

  const special = useSpecial(e, p);
  if (special) print(special, 'red');
  updateHUD();

  if (!p.hp) { combatEnd('dead'); return; }
  setButtons([{label:'Continue →', cls:'primary', action: doCombatRound}]);
}

function combatEnd(result) {
  const cs = G.combat_state;
  const p = G.player;
  p.armor = cs.player_armor_start;

  if (result === 'dead') {
    showGameOver(); return;
  }
  if (result === 'flee') {
    print(`\n  You escaped.`, 'dim');
    p.status_effects = p.status_effects.filter(e=>e!=='Stunned');
    setButtons([{label:'Continue →', action: betweenFloors}]);
    return;
  }

  // win
  print(`\n  ✦ Victory! ${cs.enemy.name} is slain.`, 'gold');
  const xpG = cs.enemy.xp_reward;
  const goldG = cs.enemy.gold_reward;
  p.gold += goldG;
  print(`  +${xpG} XP   +${goldG} gold`, 'gold');

  const lvl = gainXP(p, xpG);
  if (lvl) {
    print(`\n  ★ LEVEL UP! You are now level ${lvl}!`, 'gold2');
    print(`  Max HP +10, STR +2, AGI +1, ARC +1. Fully healed.`, 'gold2');
  }
  p.status_effects = p.status_effects.filter(e=>e!=='Stunned');
  updateHUD();

  if (cs.isElite) {
    const loot = randomLoot(1);
    if (loot.length) {
      p.inventory.push(loot[0]);
      print(`\n  📦 Elite loot: ${loot[0].name} — ${loot[0].desc}`, 'green');
    }
  }

  if (cs.isBoss) {
    if (G.floor >= 10) { showVictory(); return; }
    const loot = randomLoot(2);
    loot.forEach(item=>{
      p.inventory.push(item);
      print(`  📦 Boss loot: ${item.name} — ${item.desc}`, 'green');
    });
    p.gold += 20;
    print(`  💰 +20 gold from the boss's hoard.`, 'gold');
  }

  setButtons([{label:'Continue →', cls:'primary', action: betweenFloors}]);
}

function gainXP(p, amount) {
  p.xp += amount;
  if (p.xp >= p.xp_next) {
    p.level++;
    p.xp -= p.xp_next;
    p.xp_next = Math.floor(p.xp_next * 1.4);
    p.max_hp += 10; p.hp = p.max_hp;
    p.strength += 2; p.agility += 1; p.arcane += 1;
    return p.level;
  }
  return null;
}

// ─── SHOP ─────────────────────────────────────────────────
function shopEvent() {
  clearOutput();
  const p = G.player;
  const stock = shopStock();
  print(`\n  🛒 ── THE BONER MERCHANT ───────────────────────────`, 'gold');
  print(`  A hunched figure beckons from behind a rotting popeyes sign.`,'dim');
  print(`  Your gold: ${p.gold}g\n`);

  function renderShop() {
    clearOutput();
    print(`\n  🛒 ── THE BONER MERCHANT ───────────────────────────`, 'gold');
    print(`  Your gold: ${p.gold}g\n`);
    stock.forEach((it,i)=>print(`  [${i+1}] ${it.name} (${it.value}g) — ${it.desc}`));
    print(`\n  [0] Leave`, 'dim');
    const btns = stock.map((it,i)=>({
      label:`${it.name} (${it.value}g)`,
      cls: p.gold>=it.value?'gold':'',
      disabled: p.gold<it.value,
      action(){
        if(p.gold<it.value){print(`  ✗ Not enough gold. (Need ${it.value}g, have ${p.gold}g)`,'red');return;}
        p.gold-=it.value;
        p.inventory.push(it);
        print(`  Purchased: ${it.name}. Gold remaining: ${p.gold}g`, 'green');
        stock.splice(i,1);
        updateHUD();
        if(!stock.length){print(`  "Sold out. Move along bitch."`, 'dim');setButtons([{label:'Leave →', action: betweenFloors}]);return;}
        renderShop();
      }
    }));
    btns.push({label:'Leave →', action: betweenFloors});
    setButtons(btns);
  }
  renderShop();
}

// ─── REST ─────────────────────────────────────────────────
function restEvent() {
  clearOutput();
  const p = G.player;
  const restLines = [
    "  A dying fire.",
    "  A rare moment of silence. Wonder when MR C will yap again",
    "  A campfire. cant craft at this one bub.",
    "  whats up niggatron",
    "  A warm corner of hell. You take what you can get.",
  ];
  print(`\n  🔥 ── REST SITE ──────────────────────────────────────`, 'gold');
  print(choice(restLines), 'dim');
  print();
  const heal_amt = Math.floor(p.max_hp * 0.30);
  const healed = heal(p, heal_amt);
  print(`  You tend your wounds. Healed ${healed} HP.`, 'green');
  print(`  HP: ${p.hp}/${p.max_hp}`);
  updateHUD();

  if (p.status_effects.length) {
    print(`\n  Active effects: ${p.status_effects.join(', ')}`, 'red');
    const btns = p.status_effects.map(ef=>({
      label:`Remove: ${ef}`,
      cls:'primary',
      action(){
        p.status_effects = p.status_effects.filter(x=>x!==ef);
        print(`  ${ef} fades in the firelight.`, 'green');
        updateHUD();
        setButtons([{label:'Continue →', action: betweenFloors}]);
      }
    }));
    btns.push({label:'Continue →', action: betweenFloors});
    setButtons(btns);
  } else {
    setButtons([{label:'Continue →', action: betweenFloors}]);
  }
}

// ─── LOOT ─────────────────────────────────────────────────
function lootEvent() {
  clearOutput();
  const p = G.player;
  const cacheLines = [
    "  Hidden beneath a loose stone. Good Jew.",
    "  A crate with some shitty designer knock off logo written on it.",
    "  2 gb of RAM. Take what you can get twin",
    "  Someone left their USB here.",
    "  gooning",
  ];
  print(`\n  📦 ── ABANDONED CACHE ──────────────────────────────`, 'gold');
  print(choice(cacheLines), 'dim');
  print();
  const n = choice([1,1,2]);
  const loot = randomLoot(n);
  loot.forEach(item=>{
    p.inventory.push(item);
    print(`  Found: ${item.name} — ${item.desc}`, 'green');
  });
  const bonus = rnd(0,8);
  if (bonus) { p.gold+=bonus; print(`  Found ${bonus}g tucked inside.`, 'gold'); }
  updateHUD();
  setButtons([{label:'Continue →', action: betweenFloors}]);
}

// ─── BETWEEN FLOORS ────────────────────────────────────────
function betweenFloors() {
  clearOutput();
  printPlayerStatus();
  print(`\n  ── What will you do? ───────────────────────────────`, 'gold');
  setButtons([
  {label:'▼ Descend Deeper', cls:'primary', action(){G.floor++;runFloor();}},
  {label:'🎒 Inventory', action: showInventoryMenu},
  {label:'✦ Skills', action: showSkills},
  {label:'???', cls:'purple', action: openCheatBox},
  {label:'← Main Menu', action: showTitle},
]);
}

function printPlayerStatus() {
  const p = G.player;
  if (!p) return;
  const bar = hpBar(p.hp, p.max_hp, 20);
  const effects = p.status_effects.length ? p.status_effects.join(', ') : 'None';
  print(`\n  ╔══ ${p.name} (${p.class_name}) — Lvl ${p.level} ══╗`, 'gold');
  print(`  HP  [${bar}] ${p.hp}/${p.max_hp}`);
  print(`  STR ${p.strength}  AGI ${p.agility}  ARC ${p.arcane}  ARMOR ${p.armor}`);
  print(`  XP  ${p.xp}/${p.xp_next}   Gold: ${p.gold}g`);
  print(`  Status: ${effects}`, effects==='None'?'dim':'red');
}

function showInventoryMenu() {
  clearOutput();
  const p = G.player;
  if (!p.inventory.length) {
    print(`  YOUR FUCKING BROKE`, 'dim');
    setButtons([{label:'← Back', action: betweenFloors}]);
    return;
  }
  print(`\n  ┌── Inventory ──────────────────────────`, 'gold');
  p.inventory.forEach((it,i)=>print(`  │ [${i+1}] ${it.name} — ${it.desc}`));
  print(`  └───────────────────────────────────────`, 'gold');
  print();
  const usable = p.inventory.filter(it=>it.type==='consumable');
  if (usable.length) {
    print(`  Consumable items:`, 'dim');
    const btns = usable.map(it=>({
      label:`Use: ${it.name}`,
      cls:'gold',
      action(){
        p.inventory = p.inventory.filter(x=>x!==it);
        const r = it.use(p);
        clearOutput();
        print(r, 'green');
        updateHUD();
        setButtons([{label:'← Back to Inventory', action: showInventoryMenu},{label:'Continue →', action: betweenFloors}]);
      }
    }));
    btns.push({label:'← Back', action: betweenFloors});
    setButtons(btns);
  } else {
    print(`  No consumable items to use.`, 'dim');
    setButtons([{label:'← Back', action: betweenFloors}]);
  }
}

function showSkills() {
  clearOutput();
  const p = G.player;
  print(`\n  ── Your Skills ─────────────────────────────────────`, 'gold');
  p.skills.forEach(sk=>{ print(`  ✦ ${sk.name}`, 'gold'); print(`    ${sk.desc}`, 'dim'); });
  setButtons([{label:'← Back', action: betweenFloors}]);
}
